        section {

        h2 {

        h3 {

        .no-item {
            background: #fffcf4;
            border-radius: 8px;

        }

        .contact {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            padding: 10px 15px;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            list-style: none; 
        }
        nav {
            background-color: #8e2fc5;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }
        nav a {
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            margin: 0 10px;
            border-radius: 5px;
            transition: background-color 0.3s;
            display: inline-block;
            position: relative;
        }
        nav a:hover {
            background-color: #298c99;
        }
        nav a i {
            margin-right: 8px;
        }
